<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault | Direct File Save</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2, h3 { color: #333; text-align: center; margin-top: 0; }

        .input-group { margin-bottom: 12px; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-add { background: #28a745; color: white; }
        .btn-add:hover { background: #218838; }

        .btn-save { background: #6f42c1; color: white; margin-top: 20px; }
        .btn-save:hover { background: #5a32a3; }

        .account-list {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 5px solid #007bff;
            position: relative;
        }

        .card strong { color: #007bff; display: block; margin-bottom: 5px; }

        .delete-btn {
            position: absolute;
            right: 12px;
            top: 12px;
            color: #dc3545;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        code { background: #e9ecef; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        
        .status-msg {
            font-size: 0.8rem;
            text-align: center;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Vault Manager</h2>
        
        <div class="input-group">
            <label>Service</label>
            <input type="text" id="service" placeholder="e.g. Gmail" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="User/Email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="text" id="password" placeholder="Password">
        </div>
        
        <button class="btn-add" onclick="addAccount()">Add to Current List</button>
        <button class="btn-save" onclick="saveToDisk()">Save & Overwrite Sec_Acc.js</button>
        <p class="status-msg">Click Save to update your local file directly.</p>

        <div class="account-list" id="display">
            <h3>Stored Accounts</h3>
        </div>
    </div>

    <script src="Sec_Acc.js"></script>

    <script>
        // Use data from Sec_Acc.js if it exists, otherwise start empty
        let currentAccounts = (typeof initialData !== 'undefined') ? [...initialData] : [];

        /**
         * The Modern Save Method (File System Access API)
         * Allows overwriting the file you choose.
         */
        async function saveToDisk() {
            if (currentAccounts.length === 0) {
                alert("Nothing to save!");
                return;
            }

            // Create the content string for the JS file
            const fileContent = `const initialData = ${JSON.stringify(currentAccounts, null, 4)};\n\n// Last updated: ${new Date().toLocaleString()}`;

            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'Sec_Acc.js',
                        types: [{
                            description: 'JavaScript File',
                            accept: {'text/javascript': ['.js']},
                        }],
                    });

                    const writable = await handle.createWritable();
                    await writable.write(fileContent);
                    await writable.close();
                    alert("Success! Sec_Acc.js has been updated.");
                } catch (err) {
                    console.log("Save process was cancelled.");
                }
            } else {
                // Fallback for older browsers
                const blob = new Blob([fileContent], { type: "text/javascript" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "Sec_Acc.js";
                link.click();
                alert("Browser does not support direct overwrite. File downloaded to your Downloads folder.");
            }
        }

        function addAccount() {
            const s = document.getElementById('service').value;
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (!s || !u || !p) return alert("Please fill in all fields.");

            currentAccounts.push({ service: s, user: u, pass: p });
            render();

            document.getElementById('service').value = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function deleteAcc(index) {
            if (confirm("Remove this entry? (Click Save to make this permanent)")) {
                currentAccounts.splice(index, 1);
                render();
            }
        }

        function render() {
            const container = document.getElementById('display');
            container.innerHTML = '<h3>Stored Accounts</h3>';
            
            if (currentAccounts.length === 0) {
                container.innerHTML += '<p style="text-align:center;color:#999;">Vault is empty.</p>';
                return;
            }

            currentAccounts.forEach((acc, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <strong>${acc.service}</strong>
                    <span class="delete-btn" onclick="deleteAcc(${index})">Delete</span>
                    <div><small>User:</small> <code>${acc.user}</code></div>
                    <div><small>Pass:</small> <code>${acc.pass}</code></div>
                `;
                container.appendChild(div);
            });
        }

        // Initial render
        window.onload = render;
    </script>
</body>
</html>
