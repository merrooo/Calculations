<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم - الحسابات الكهربية</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

  <style>
    :root {
      --primary-green: #2e68cc;
      --light-bg: #f9fbf9;
      --border-color: #0c2de8;
      --dark-green: #041136;
      --text-dark: #2c3e50;
      --text-light: #7f8c8d;
      --white: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius: 12px;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Cairo", sans-serif;
      background-color: var(--light-bg);
      color: var(--text-dark);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Navigation */
    .main-nav {
      background: var(--white);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      border-bottom: 3px solid var(--primary-green);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      background: linear-gradient(135deg,
          var(--primary-green),
          var(--dark-green));
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
    }

    .brand-text h2 {
      font-size: 1rem;
      line-height: 1.4;
      font-weight: 600;
    }

    .brand-text .subtitle {
      font-size: 0.85rem;
      color: var(--text-light);
      display: block;
    }

    .time-box {
      background: var(--light-bg);
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--dark-green);
    }

    /* Layout */
    .main-container {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .menu-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border-color);
      max-width: 800px; /* تم زيادة العرض الأقصى ليتناسب مع توزيع الشبكة الجديد */
      margin: 0 auto;
    }

    .card-header {
      background: linear-gradient(to left,
          var(--primary-green),
          var(--dark-green));
      color: white;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .card-header h3 {
      margin: 0;
      font-size: 1.3rem;
    }

    /* تحويل الجسم ليعمل بنظام الشبكة المتجاوبة Grid */
    .card-body {
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }

    /* Links */
    .menu-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.2rem;
      background: var(--light-bg);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-dark);
      transition: var(--transition);
      border: 1px solid transparent;
      font-weight: 500;
    }

    .menu-link:hover {
      background: white;
      color: var(--dark-green);
      border-color: var(--primary-green);
      transform: translateX(5px); /* تعديل الحركة لتناسب اتجاه الـ RTL */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .menu-link ion-icon {
      color: var(--primary-green);
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-nav {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .nav-brand {
        flex-direction: column;
      }

      .card-body {
        grid-template-columns: 1fr; /* العودة لنظام العمود الواحد على الشاشات الصغيرة */
      }
    }
  </style>
</head>

<body>
  <nav class="main-nav">
    <div class="nav-brand">
      <div class="logo">
        <ion-icon name="leaf-outline"></ion-icon>
      </div>
      <div class="brand-text">
        <h2>
          وزارة الكهرباء والطاقة المتجددة
          <span class="subtitle">شركة شمال الدلتا لتوزيع الكهرباء</span>
        </h2>
      </div>
    </div>
    <div class="time-box">
      <ion-icon name="time-outline"></ion-icon>
      <span id="currentTime"></span>
    </div>
  </nav>

  <main class="main-container">
    <div class="menu-card">
      <div class="card-header">
        <ion-icon name="calculator-outline"></ion-icon>
        <h3> الكهربية</h3>
      </div>
      <div class="card-body">
        <a href="Angles.html" class="menu-link">
          <ion-icon name="analytics-outline"></ion-icon>
          <span>تحليل الزوايا</span>
        </a>
        <a href="Power.html" class="menu-link">
          <ion-icon name="calculator-outline"></ion-icon>
          <span>حسابات القدرة</span>
        </a>
        <a href="Trf-Motor.html" class="menu-link">
          <ion-icon name="construct-outline"></ion-icon>
          <span>محولات ومحركات</span>
        </a>
        <a href="P.F.html" class="menu-link">
          <ion-icon name="flash-outline"></ion-icon>
          <span>معامل القدرة</span>
        </a>
        <a href="Tariffs.html" class="menu-link">
          <ion-icon name="cash-outline"></ion-icon>
          <span>الشرائح</span>
        </a>
        <a href="Distance_Relay.html" class="menu-link">
          <ion-icon name="trail-sign-outline"></ion-icon>
          <span>الحماية الخطية</span>
        </a>
        <a href="Cables_V.D_Calculator.html" class="menu-link">
          <ion-icon name="flash-outline"></ion-icon>
          <span>الكابلات والفقد في الجهد</span>
        </a>
        <a href="Research.html" class="menu-link">
          <ion-icon name="book-outline"></ion-icon>
          <span>المادة العلمية للعدادات الذكية</span>
        </a>
        <a href="Spex.html" class="menu-link">
          <ion-icon name="document-text-outline"></ion-icon>
          <span>المواصفات الفنية</span>
        </a>
        <a href="TVJ.html" class="menu-link">
          <ion-icon name="tv-outline"></ion-icon>
          <span>نظام TVJ</span>
        </a>
         <a href="Angles.html" class="menu-link">
          <ion-icon name="tv-outline"></ion-icon>
          <span>تحليل وتصحيح الزوايا </span>
        </a>
        <a href="Bar_Code_Gen.html" class="menu-link">
          <ion-icon name="qr-code-outline"></ion-icon>
          <span>Bar-QR-Code Generator</span>
        </a>
        <a href="SMART_Help.html" class="menu-link">
          <ion-icon name="information-circle-outline"></ion-icon>
          <span>المساعدة</span>
        </a>
      </div>
    </div>
  </main>

  <script>
    function updateTime() {
      const now = new Date();
      const options = {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      };
      document.getElementById("currentTime").textContent =
        now.toLocaleDateString("ar-EG", options);
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateTime();
      setInterval(updateTime, 1000);
    });
  </script>
</body>

</html>
