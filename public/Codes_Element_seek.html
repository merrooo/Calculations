<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML + Firebase CRUD Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      <style > :root {
        --bg: #0b1220;
        --panel: #111c33;
        --line: #2b3f63;
        --text: #e6eefc;
        --muted: #9ab0d6;
        --primary: #2f80ed;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Segoe UI,
          Tahoma,
          Arial,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #1a2c4d 0, transparent 35%),
          radial-gradient(circle at 90% 90%, #153a56 0, transparent 35%),
          var(--bg);
        display: grid;
        grid-template-columns: 430px 1fr;
        gap: 14px;
        padding: 14px;
        position: relative;
      }

      /* Home Button - Centered in Header */
      .home-button-container {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
      }

      .btn-home {
        background: linear-gradient(135deg, #2f80ed, #1a5bbf);
        border: none;
        color: #fff;
        padding: 12px 30px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 5px 20px rgba(47, 128, 237, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.2);
        letter-spacing: 0.5px;
      }

      .btn-home:hover {
        background: linear-gradient(135deg, #1a5bbf, #2f80ed);
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(47, 128, 237, 0.6);
      }

      .btn-home i {
        font-size: 1.1rem;
        margin-right: 5px;
      }

      .btn-home .arrow {
        font-size: 1.2rem;
      }

      .left,
      .right {
        background: linear-gradient(
          180deg,
          rgba(17, 28, 51, 0.98),
          rgba(12, 22, 42, 0.98)
        );
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        margin-top: 70px; /* Increased margin to account for centered button */
      }

      .left {
        padding: 14px;
        max-height: calc(100vh - 28px);
        overflow: auto;
      }

      .right {
        padding: 14px;
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 28px);
        margin-top: 70px; /* Increased margin to account for centered button */
      }

      h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      label {
        display: block;
        margin: 8px 0 4px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }

      input,
      select {
        width: 100%;
        margin: 0 0 6px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #0c162b;
        color: var(--text);
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: #64a8ff;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.2);
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        margin: 3px;
      }

      .primary {
        background: var(--primary);
        color: #fff;
      }

      .success {
        background: var(--success);
        color: #fff;
      }

      .warning {
        background: var(--warning);
        color: #111;
      }

      .danger {
        background: var(--danger);
        color: #fff;
      }

      .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .chip {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 999px;
        background: #1f355b;
        border: 1px solid #34568d;
        margin: 3px 3px 0 0;
        cursor: pointer;
        font-size: 12px;
      }

      .chip:hover {
        background: #7f1d1d;
        border-color: #ef4444;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
        margin: 3px 0 8px;
      }

      pre {
        margin: 8px 0 0;
        flex: 1;
        overflow: auto;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #020811;
        color: #93f5c8;
        padding: 12px;
        font-family: Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 12px 0;
      }

      /* Button container in output section */
      .button-container {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }

      .calc-btn {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        margin-left: auto;
      }

      .calc-btn:hover {
        background: linear-gradient(135deg, #d97706, #f59e0b);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
      }

      @media (max-width: 1080px) {
        body {
          grid-template-columns: 1fr;
        }

        .btn-grid {
          grid-template-columns: 1fr;
        }

        .left,
        .right {
          margin-top: 80px; /* Increased for mobile */
        }

        .home-button-container {
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          width: 90%; /* Make container responsive */
          max-width: 300px; /* Limit maximum width */
        }

        .btn-home {
          padding: 10px 20px;
          font-size: 0.95rem;
          width: 100%; /* Full width on mobile */
          justify-content: center;
        }
      }

      @media (max-width: 480px) {
        .left,
        .right {
          margin-top: 90px; /* Even more margin for very small screens */
        }

        .home-button-container {
          top: 15px;
          max-width: 260px;
        }

        .btn-home {
          padding: 8px 16px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Home Button at Top Right -->
    <div class="home-button-container">
      <button class="btn-home" onclick="window.location.href = 'index.html'">
        <span class="arrow">⬅️</span> الصفحة الرئيسية
      </button>
    </div>

    <section class="left">
      <h3>Basic Settings</h3>
      <label>Page Name</label>
      <input id="pageTitle" value="My App" />
      <label>Database Node</label>
      <input id="nodePath" value="users" />
      <label>ID Field</label>
      <input id="idField" value="id" />

      <hr />

      <h3>Create Element</h3>
      <select id="elementType">
        <option value="input">Text Input</option>
        <option value="number">Number Input</option>
        <option value="email">Email Input</option>
        <option value="password">Password Input</option>
        <option value="tel">Telephone Input</option>
        <option value="url">URL Input</option>
        <option value="textarea">Textarea</option>
        <option value="select">Select Dropdown</option>
        <option value="checkbox">Checkbox</option>
        <option value="radio">Radio Group</option>
        <option value="range">Range Slider</option>
        <option value="date">Date Picker</option>
        <option value="time">Time Picker</option>
        <option value="label">Label</option>
        <option value="image">Image</option>
        <option value="upload">File Upload</option>
        <option value="list">List</option>
        <option value="table">Table</option>
      </select>

      <label>Element ID</label>
      <input id="cfg_id" placeholder="name" />
      <label>Label</label>
      <input id="cfg_label" placeholder="Name" />
      <label id="cfg_extra_label">Extra (for select/list/table/radio)</label>
      <input id="cfg_extra" placeholder="option1,option2 OR col1,col2" />
      <div class="muted">
        Comma separated values for `select`, `list`, `table`, `radio`.
      </div>

      <button class="primary" id="addElement">Add Element</button>
      <div id="chips"></div>

      <hr />

      <h3>Generate</h3>
      <div class="btn-grid">
        <button class="success" id="genHTML">Generate HTML</button>
        <button class="success" id="genPage">Generate Full Page</button>
      </div>
      <label>Snippet Type</label>
      <select id="snippetType">
        <option value="config">Firebase Config</option>
        <option value="all">All CRUD JS</option>
        <option value="add">Add</option>
        <option value="fetch">Fetch By ID</option>
        <option value="fetchAll">Fetch All</option>
        <option value="update">Update</option>
        <option value="delete">Delete By ID</option>
        <option value="deleteAll">Delete All</option>
        <option value="populate">Populate Table</option>
        <option value="excel">Export Excel</option>
      </select>
      <button class="warning" id="genSnippet">Generate Snippet</button>
    </section>

    <section class="right">
      <h3>Output</h3>
      <div class="button-container">
        <button onclick="copyCode()">Copy</button>
        <button onclick="downloadCode()">Download</button>
        <!-- Removed the home button from here -->
      </div>
      <pre id="output">Choose a generator button.</pre>
    </section>

    <script src="Codes_Element_seek.js"></script>
  </body>
</html>
