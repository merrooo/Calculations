<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>التشريح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-color: #004a99;
            --secondary-color: #0099ff;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --border-radius: 12px;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border-right: 5px solid var(--primary-color);
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        @media (max-width: 992px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 8px;
        }

        .mode-switch {
            display: flex;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .mode-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            background: #fff;
        }

        .form-control:focus { border-color: var(--secondary-color); }

        .upload-box {
            border: 2px dashed #cbd5e1;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #f8fafc;
            transition: 0.2s;
        }

        .upload-box:hover {
            border-color: var(--primary-color);
            background: #f1f5f9;
        }

        .upload-box i {
            font-size: 2rem;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .result-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-info h3 {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .stat-info p {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 50px;
            background: #e6f0fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: right;
        }

        th {
            background: #f8fafc;
            color: var(--text-main);
            font-weight: 700;
            padding: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            color: #4a5568;
        }

        tr:hover td { background-color: #f8fafc; }

        /* لتمييز بداية ونهاية حسابات كل مشترك ملون داخل جدول الـ Excel المدمج */
        .record-separator {
            border-top: 2px solid var(--primary-color) !important;
            background-color: #f1f5f9 !important;
            font-weight: bold;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: #003d80; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #27ae60; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-info { background: #e0f2fe; color: #0369a1; }
        .badge-dark { background: #1e293b; color: #f8fafc; }
    </style>
</head>

        function getSmartPeriodKey(year, month) {
            const y = parseInt(year); const m = parseInt(month);
            if (isNaN(y) || isNaN(m)) return "Apr-2026";
            const ref = (y * 100) + m;
            if (ref >= 202604) return "Apr-2026";
            if (ref >= 202408) return "Aug-2024";
            if (ref >= 202401) return "Jan2024-Jul2024";
            if (ref >= 202101) return "2021-2023";
            return "2019-2020";
        }

        // دالة تشريح وحساب موحدة تخدم العرض اليدوي والـ Excel بالتفصيل الكامل
        function getTariffRowsBreakdown(kwh, type, periodKey) {
            if (isNaN(kwh) || kwh <= 0) return [];
            const cfg = allConfigs[periodKey]; if (!cfg) return [];
            const rates = cfg[type]; if (!rates) return [];
            
            const rows = []; let remaining = kwh;
            for (let i = 0; i < rates.length && remaining > 0; i++) {
                const slab = rates[i]; const qty = Math.min(remaining, slab.limit);
                if (qty > 0) {
                    const rTotal = (qty * slab.p + slab.s) + (slab.extraDiff || 0);
                    rows.push({ slab: slab.label, qty, price: slab.p, service: slab.s, diff: slab.extraDiff || 0, total: rTotal });
                    remaining -= qty;
                }
            } return rows;
        }

            tbody.innerHTML = "";

            // هيكلية عناوين الجدول الموحدة لعرض الشرائح التفصيلية دائماً
            theadRow.innerHTML = `<th>م / السجل</th><th>العام/الشهر</th><th>الشريحة المطبقة</th><th>الكمية (ك.و.س)</th><th>سعر الكيلو (ج)</th><th>مقابل خدمة العملاء</th><th>فروق أخرى</th><th>الإجمالي</th>`;

            if (currentMode === 'manual') {
                const kwh = parseFloat(document.getElementById("manualKwh").value) || 0;
                const activeKey = periodSelect === "auto_map" ? "Apr-2026" : periodSelect;
                const rows = getTariffRowsBreakdown(kwh, type, activeKey);
                let sumCost = 0;

                document.getElementById("tableHeaderTitle").innerHTML = `<i class="fas fa-list-ol"></i> تشريح ملف اكسيل`;
                
                if(rows.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--text-light);">يرجى إدخال كمية استهلاك صحيحة...</td></tr>`;
                }

                rows.forEach(r => {
                    sumCost += r.total;
                    tbody.innerHTML += `<tr>
                        <td><span class="badge badge-dark">يدوي</span></td>
                        <td>---</td>
                        <td><span class="badge badge-info">${r.slab}</span></td>
                        <td>${r.qty.toFixed(2)}</td><td>${r.price}</td><td>${r.service}</td><td>${r.diff}</td>
                        <td style="font-weight:700; color:var(--primary-color);">${r.total.toFixed(2)} ج</td>
                    </tr>`;
                });

                document.getElementById("totalKwh").innerText = kwh.toFixed(2);
                document.getElementById("totalTariff").innerText = sumCost.toFixed(2);
            } else {
                if (uploadedData.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--text-light);">يرجى رفع ملف الاستهلاك لتفكيك شرائحه بالتفصيل هنا...</td></tr>`;
                    document.getElementById("totalKwh").innerText = "0";
                    document.getElementById("totalTariff").innerText = "0.00";
                    return;
                }

                document.getElementById("tableHeaderTitle").innerHTML = `<i class="fas fa-table"></i>شرائح الأستهلاك`;
                
                let grandKwh = 0; let grandCost = 0;

                uploadedData.forEach((item, index) => {
                    const finalPeriodKey = periodSelect === "auto_map" ? getSmartPeriodKey(item.year, item.month) : periodSelect;
                    const rows = getTariffRowsBreakdown(item.consumption, type, finalPeriodKey);
                    
                    grandKwh += item.consumption;

                    if(rows.length === 0) {
                         tbody.innerHTML += `<tr class="record-separator">
                            <td>${index + 1}</td>
                            <td>${item.year}/${item.month}</td>
                            <td colspan="5" style="color:var(--danger); text-align:center;">استهلاك صفر أو غير صحيح</td>
                            <td>0.00 ج</td>
                         </tr>`;
                    }

                    rows.forEach((r, rIdx) => {
                        grandCost += r.total;
                        // نضع كلاس تمييز record-separator على أول شريحة من كل مشترك جديد لسهولة القراءة بوضوح
                        const isFirstRow = (rIdx === 0) ? 'class="record-separator"' : '';
                        
                        tbody.innerHTML += `<tr ${isFirstRow}>
                            <td>${rIdx === 0 ? `<b>السجل ${index + 1}</b>` : ''}</td>
                            <td>${rIdx === 0 ? `${item.year || '---'} / ${item.month || '---'}` : ''}</td>
                            <td><span class="badge badge-info">${r.slab}</span></td>
                            <td>${r.qty.toFixed(2)}</td>
                            <td>${r.price}</td>
                            <td>${r.service}</td>
                            <td>${r.diff}</td>
                            <td style="font-weight:700; color:var(--primary-color);">${r.total.toFixed(2)} ج</td>
                        </tr>`;
                    });
                });

                document.getElementById("totalKwh").innerText = grandKwh.toFixed(2);
                document.getElementById("totalTariff").innerText = grandCost.toFixed(2);
                document.getElementById("recordsCount").innerText = uploadedData.length;
            }
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            document.getElementById("fileStatus").innerText = "جاري قراءة ومعالجة الملف الفني...";
            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const ws = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws);

                let consKey = "", yearKey = "", monthKey = "";
                if (rows.length > 0) {
                    const firstRow = rows[0];
                    for (let key in firstRow) {
                        const kTrim = String(key).trim();
                        if (kTrim.includes("كمية ك و س") || kTrim.includes("ك و س") || kTrim.includes("الاستهلاك") || kTrim.includes("الكمية")) consKey = key;
                        if (kTrim === "العام" || kTrim.includes("عام") || kTrim === "السنة" || kTrim.includes("سنة")) yearKey = key;
                        if (kTrim === "الشهر" || kTrim.includes("شهر") || kTrim.includes("Month")) monthKey = key;
                    }
                }

                if (!consKey) {
                    alert("لم يتم العثور على حقل يحتوي على كمية الاستهلاك بالملف! يرجى التحقق من العناوين.");
                    document.getElementById("fileStatus").innerText = "خطأ بالملف";
                    return;
                }

                uploadedData = rows.map(r => ({
                    consumption: parseFloat(r[consKey]) || 0,
                    year: r[yearKey] ? String(r[yearKey]).trim() : "",
                    month: r[monthKey] ? String(r[monthKey]).trim() : ""
                })).filter(item => item.consumption >= 0);

                document.getElementById("fileStatus").innerText = `✅ تم تحميل ${uploadedData.length} سجل وتشريحها بنجاح!`;
                calculateTariffs();
            };
            reader.readAsArrayBuffer(file);
        }

        function exportAllToExcel() {
            if (uploadedData.length === 0) return;
            const type = document.getElementById("tariffType").value;
            const periodSelect = document.getElementById("periodSelect").value;
            
            const detailedReportRows = [];
            
            uploadedData.forEach((item, idx) => {
                const activeKey = periodSelect === "auto_map" ? getSmartPeriodKey(item.year, item.month) : periodSelect;
                const rows = getTariffRowsBreakdown(item.consumption, type, activeKey);
                
                rows.forEach(r => {
                    detailedReportRows.push({
                        "رقم السجل المرجعي": idx + 1,
                        "العام": item.year,
                        "الشهر": item.month,
                        "إجمالي استهلاك السجل": item.consumption,
                        "التعريفة النشطة": activeKey,
                        "الشريحة المفككة": r.slab,
                        "الكمية داخل الشريحة": r.qty,
                        "سعر الكيلو (جنيه)": r.price,
                        "مقابل خدمة العملاء": r.service,
                        "فروق شريحة أخرى": r.diff,
                        "إجمالي تكلفة الشريحة (جنيه)": parseFloat(r.total.toFixed(2))
                    });
                });
            });

            const ws = XLSX.utils.json_to_sheet(detailedReportRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "تفاصيل الشرائح الكاملة");
            XLSX.writeFile(wb, `تقرير_تشريح_تفصيلي_شامل_${type}.xlsx`);
        }

        document.getElementById("tariffType").addEventListener("change", calculateTariffs);
        document.getElementById("periodSelect").addEventListener("change", calculateTariffs);

        window.onload = function () { selectMode('manual'); };
    </script>
</body>

</html>
